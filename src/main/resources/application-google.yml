# Google Health API profile — activate with SPRING_PROFILES_ACTIVE=google
# Non-breaking: only loaded when the 'google' profile is active. The default
# (Fitbit) config in application.yml is unaffected.
#
# Requires env vars: GOOGLE_HEALTH_CLIENT_ID, GOOGLE_HEALTH_CLIENT_SECRET
# (obtain by registering the app in the Google Cloud / Health API console).

spring:
    security:
        oauth2:
            client:
                registration:
                    google-health:
                        client-id: ${GOOGLE_HEALTH_CLIENT_ID}
                        client-secret: ${GOOGLE_HEALTH_CLIENT_SECRET}
                        redirect-uri: http://localhost:8080/callback
                        authorization-grant-type: authorization_code
                        client-authentication-method: client_secret_basic
                        scope:
                            - openid
                            - profile
                            - https://www.googleapis.com/auth/googlehealth.activity_and_fitness.readonly
                            - https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements.readonly
                            - https://www.googleapis.com/auth/googlehealth.sleep.readonly
                provider:
                    google-health:
                        # Google's standard OAuth 2.0 / OIDC endpoints
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
                        jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
                        user-name-attribute: sub
                        # offline access + consent prompt are required to receive a refresh token
                        # (configure these on the authorization request; see GoogleHealthApiConfig notes)

google-health:
    client-id: ${GOOGLE_HEALTH_CLIENT_ID}
    client-secret: ${GOOGLE_HEALTH_CLIENT_SECRET}
    base-url: https://health.googleapis.com/v4
